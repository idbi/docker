; Production PHP settings for Laravel.
; Loaded as conf.d/zz-laravel.ini so it overrides the base image defaults.

; --- Performance ---
memory_limit = 512M                 ; At least 256M for most Laravel apps. 512M is safe.
max_execution_time = 60             ; 30 is default; 60 for artisan or queues.
max_input_time = 60                 ; Acceptable for uploads/forms.
max_input_vars = 5000               ; Boost if you have huge forms.

; --- Uploads ---
upload_max_filesize = 64M           ; Adjust for your needs (Laravel validates file size)
post_max_size = 65M                 ; Must be >= upload_max_filesize

; --- File Access ---
; Restricts PHP filesystem access for added security. Paths are adapted to this
; image's layout (app served from /var/www/html). If a downstream app reads or
; writes outside these paths, extend this list via a later-loading .ini.
open_basedir = /app:/app/vendor:/app/storage:/app/bootstrap:/tmp:/dev/null

; --- Error Handling ---
display_errors = Off                ; Required for production
display_startup_errors = Off
log_errors = On                     ; Yes: Log errors
error_log = /var/log/php-fpm/errors.log ; Writable dir created in the image; see README for stderr alternative
error_reporting = E_ALL & ~E_DEPRECATED & ~E_NOTICE ; Laravel handles logging; still log serious errors
expose_php = Off                    ; Don't leak the PHP version in headers

; --- Character Encoding ---
default_charset = "UTF-8"
date.timezone = UTC

; Enable OPcache for PHP-FPM
opcache.enable=1
opcache.enable_cli=0

; Memory allocated to store precompiled scripts
opcache.memory_consumption=512
; Hash table size for storing scripts
opcache.interned_strings_buffer=128
; Max scripts in the cache (adjust for your codebase size)
opcache.max_accelerated_files=60000

; How often to check file timestamps for changes (seconds)
; Set to 0 to check only at PHP restart (best for production)
opcache.file_update_protection=0
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.file_cache=/tmp/php-opcache
opcache.file_cache_only=0
opcache.file_cache_consistency_checks=0

; Enable and optimize for better performance with recent PHP versions
opcache.jit=1255        ; JIT mode (requires PHP 8+)
opcache.jit_buffer_size=128M

; --- Performance extra ---
opcache.max_wasted_percentage=5
opcache.revalidate_path=0
opcache.save_comments=1
opcache.fast_shutdown=1

; --- Realpath cache (important for Laravel autoloader) ---
realpath_cache_size = 4096K
realpath_cache_ttl = 600
