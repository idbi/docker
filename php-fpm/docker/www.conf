; Tuned PHP-FPM pool for containerized Laravel.
; Loaded as php-fpm.d/zz-www.conf so it overrides the default www pool.

; Only log errors from the FPM master. The base image defaults to `notice`,
; which emits "ready to handle connections" on boot and per-event process
; warnings under `pm = dynamic` (e.g. "seems busy, spawning", "reached
; pm.max_children"). Raise back to `warn`/`notice` if you want those capacity
; signals; they are dropped here so only genuine errors reach the logs.
[global]
log_level = error

[www]
user = www-data
group = www-data

; Listen on TCP so a separate nginx container/pod can reach FPM.
listen = 9000

; Process manager. Defaults are conservative; tune via the env vars below to
; match the container's CPU/memory allocation. `clear_env = no` is what lets
; container environment variables (DB creds, APP_KEY, etc.) reach PHP.
pm = dynamic
pm.max_children = ${PHP_FPM_PM_MAX_CHILDREN}
pm.start_servers = ${PHP_FPM_PM_START_SERVERS}
pm.min_spare_servers = ${PHP_FPM_PM_MIN_SPARE_SERVERS}
pm.max_spare_servers = ${PHP_FPM_PM_MAX_SPARE_SERVERS}
pm.max_requests = 500

clear_env = no

; Endpoints used by the healthcheck and by monitoring.
ping.path = /ping
ping.response = pong
pm.status_path = /status

; Send worker stdout/stderr (Laravel logs, warnings) to the container logs.
catch_workers_output = yes
decorate_workers_output = no

; Disable per-request access logging. The base image's php-fpm.d/docker.conf
; sets `access.log = /proc/self/fd/2`, so this MUST be an explicit override --
; merely omitting (or commenting out) the directive leaves the inherited value
; active and FPM keeps logging every request. Pointing it at /dev/null is the
; only supported way to turn it off. nginx already logs every request, so this
; just removes duplicate noise; PHP errors and worker output still reach the
; logs via error_log and catch_workers_output. To re-enable, set it back to
; access.log = /proc/self/fd/2
access.log = /dev/null
