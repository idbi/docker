; Tuned PHP-FPM pool for containerized Laravel.
; Loaded as php-fpm.d/zz-www.conf so it overrides the default www pool.

[www]
user = www-data
group = www-data

; Listen on TCP so a separate nginx container/pod can reach FPM.
listen = 9000

; Process manager. Defaults are conservative; tune via the env vars below to
; match the container's CPU/memory allocation. `clear_env = no` is what lets
; container environment variables (DB creds, APP_KEY, etc.) reach PHP.
pm = dynamic
pm.max_children = ${PHP_FPM_PM_MAX_CHILDREN}
pm.start_servers = ${PHP_FPM_PM_START_SERVERS}
pm.min_spare_servers = ${PHP_FPM_PM_MIN_SPARE_SERVERS}
pm.max_spare_servers = ${PHP_FPM_PM_MAX_SPARE_SERVERS}
pm.max_requests = 500

clear_env = no

; Endpoints used by the healthcheck and by monitoring.
ping.path = /ping
ping.response = pong
pm.status_path = /status

; Send worker stdout/stderr (Laravel logs, warnings) to the container logs.
catch_workers_output = yes
decorate_workers_output = no

; Per-request access logging is disabled: nginx already logs every request,
; so FPM's access log would only duplicate that (and add noise/overhead).
; PHP errors and worker output still reach the container logs via the settings
; above and php.ini's error_log. To re-enable, set: access.log = /proc/self/fd/2
