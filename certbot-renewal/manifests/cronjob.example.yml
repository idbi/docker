apiVersion: batch/v1
kind: CronJob
metadata:
  name: certbot-renewal-development
spec:
  schedule: "0 2 * * *"  # Runs daily at 2AM UTC; adjust as needed
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          volumes:
            - name: letsencrypt-logs
              emptyDir: {}
          restartPolicy: Never
          containers:
            - name: certbot-renewal
              image: ghcr.io/idbi/docker-certbot-renewal:latest
              imagePullPolicy: Always
              volumeMounts:
                - name: letsencrypt-logs
                  mountPath: /var/log/letsencrypt
              envFrom:
                - secretRef:
                    name: vault-credentials
                - secretRef:
                    name: route53-credentials
              env:
                - name: VAULT_ADDR
                  value: "https://vault.idbi.pe"
                - name: DOMAIN
                  value: "idbi.pe"                # <-- Change domain
                - name: EMAIL
                  value: "infrastructure@idbi.pe"          # <-- Change email
                - name: VAULT_CERT_PATH
                  value: "idbi/certificates/nginx"         # <-- Change vault path
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 100m
                  memory: 512Mi
          # (Optional) Set serviceAccountName if using specific RBAC/pod identity
          # serviceAccountName: certbot-renewal