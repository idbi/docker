# Production nginx main config for serving Laravel behind a php-fpm container.
# Runs non-root: `pid` and all temp paths point at writable locations, and no
# `user` directive is set (it is ignored — and warns — when the master process
# is already unprivileged). Runtime-tunable directives live in the server block
# template (conf.d), which is the only file the base image envsubst's.

worker_processes auto;
pid /tmp/nginx.pid;

# Send the master/worker error log to the container's stderr.
error_log /dev/stderr warn;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging (to the container's stdout) ---
    log_format main '[$time_iso8601] '
                '$remote_addr'
                '"$request_method" "$request_uri" "$args" '
                '$status $body_bytes_sent '
                '"$http_referer" "$http_user_agent" '
                '"$http_x_forwarded_for" "$http_origin" '
                '"$request_time" "$upstream_connect_time" '
                '"$upstream_header_time" "$upstream_response_time" '
                '"$request_id"';

    access_log /dev/stdout main;

    # --- Performance ---
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;              # don't leak the nginx version

    client_body_timeout 60s;
    send_timeout        60s;

    # --- Compression ---
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml;

    # --- Writable temp paths for non-root operation ---
    client_body_temp_path /tmp/nginx-client;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    # Rendered from /etc/nginx/templates/default.conf.template at boot.
    include /etc/nginx/conf.d/*.conf;
}
