services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped

    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false

      # entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443

      # HTTP/3 (QUIC) on the secure entrypoint. Stable in Traefik v3 (no
      # experimental flag needed). Traefik advertises h3 to clients via an
      # Alt-Svc header on :443; it requires the UDP 443 port published below,
      # and UDP/443 must be open at the host/cloud firewall.
      - --entrypoints.websecure.http3=true
      - --entrypoints.websecure.http3.advertisedport=443

      # letsencrypt
      - --certificatesresolvers.letsencrypt.acme.email=cloud@no-id.org
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web

    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp" # QUIC / HTTP-3

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme.json:/letsencrypt/acme.json

    networks:
      - proxy

networks:
  proxy:
    external: true